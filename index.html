<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prizakita Trade Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scroll">
    <h1 style="text-align:center; font-family: 'MedievalSharp';">⚔️ Prizakita Merchant Ledger ⚔️</h1>

    <div id="auth-bar" class="auth-bar">
        </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showSection('values', this)">VALUES</button>
        <button class="tab-btn" onclick="showSection('guild-market', this)">GUILD MARKET</button>
        <button class="tab-btn" onclick="showSection('allies', this)">ALLIED GUILDS</button>
    </div>

    <div id="values" class="content-section active">
        <div id="values-filter-container" class="filter-container">
            <button class="filter-btn active" onclick="filterList('values', 'all', this)">All</button>
            </div>

        <div class="values-table-header">
            <span>ITEM</span>
            <span>CATEGORY</span>
            <span>VALUE</span>
            <span>DEMAND</span>
        </div>
        <div id="values-list-container">
            </div>
    </div>

    <div id="guild-market" class="content-section">
        <table class="listing-table">
            <thead>
                <tr>
                    <th>Merchant</th>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Qty</th>
                </tr>
            </thead>
            <tbody id="market-list-container">
                </tbody>
        </table>
    </div>

    <div id="allies" class="content-section">
        <div id="allies-container" class="allies-container">
            </div>
    </div>
</div>

<div id="createModal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer; font-size:2rem;" onclick="closeModal()">&times;</span>
        <h2 style="text-align:center; font-family:'MedievalSharp';">Post New Wares</h2>
        
        <div id="modal-filter-container" class="filter-container">
            <button class="filter-btn active" onclick="filterList('wares', 'all', this)">All</button>
            </div>

        <div class="items-grid" id="wares-grid-container">
            </div>

        <form id="add-item-form" style="margin-top:20px;">
            <input type="hidden" id="selected_item_name" required>
            <p style="text-align:center;">Selected: <span id="selection_label" class="red-text">None</span></p>
            <div style="display:flex; gap:10px;">
                <input type="number" id="form-price" placeholder="Price" style="flex:1; padding:10px;" required>
                <input type="number" id="form-qty" value="1" min="1" style="width:60px; padding:10px;">
            </div>
            <button type="submit" class="tab-btn" style="width:100%; margin-top:15px; background:var(--border-ink); color:white;">POST LISTING</button>
        </form>
    </div>
</div>
<script>
let currentUser = JSON.parse(localStorage.getItem('user_session')) || { is_logged_in: false };

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.has('logged')) {
    currentUser = {
        is_logged_in: true,
        username: urlParams.get('user'),
        avatar: urlParams.get('avatar'),
        id: urlParams.get('id')
    };
    localStorage.setItem('user_session', JSON.stringify(currentUser));
    window.location.href = "https://prizakita.github.io/"; 
}

async function init() {
    renderAuth(currentUser);
    
    const addBtn = document.getElementById('btn-open-modal');
    if (addBtn) {
        addBtn.style.display = currentUser.is_logged_in ? 'block' : 'none';
    }

    try {
        const res = await fetch(`${API_BASE_URL}/api/market-data`);
        const data = await res.json();
        
        if (typeof renderValues === "function") renderValues(data.items);
        if (typeof renderMarket === "function") renderMarket(data.all_market_listings);
        if (typeof renderAllies === "function") renderAllies(data.allies);
    } catch (e) {
        console.error("Errore fetch:", e);
    }
}

function renderAuth(user) {
    const authBar = document.getElementById('auth-bar');
    if (!authBar) return;
    
    if (user && user.is_logged_in) {
        authBar.innerHTML = `
            <div class="user-profile">
                <img src="${user.avatar}" alt="Avatar" class="avatar">
                <span>Benvenuto, ${user.username}</span>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>`;
    } else {
        authBar.innerHTML = `<a href="${API_BASE_URL}/login" class="btn-discord">LOGIN WITH DISCORD</a>`;
    }
}

function logout() {
    localStorage.removeItem('user_session');
    window.location.reload();
}

init();
</script>
</body>
</html>
