<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prizakita Trade Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scroll">
    <h1 style="text-align:center; font-family: 'MedievalSharp';">⚔️ Prizakita Merchant Ledger ⚔️ V0.1</h1>

    <div id="auth-bar" class="auth-bar">
        </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showSection('values', this)">VALUES</button>
        <button class="tab-btn" onclick="showSection('guild-market', this)">GUILD MARKET</button>
        <button class="tab-btn" onclick="showSection('allies', this)">ALLIED GUILDS</button>
    </div>

    <div id="values" class="content-section active">
        <div id="values-filter-container" class="filter-container">
            <button class="filter-btn active" onclick="filterList('values', 'all', this)">All</button>
            </div>

        <div class="values-table-header">
            <span>ITEM</span>
            <span>CATEGORY</span>
            <span>VALUE</span>
            <span>DEMAND</span>
        </div>
        <div id="values-list-container">
            </div>
    </div>

    <div id="guild-market" class="content-section">
        <table class="listing-table">
            <thead>
                <tr>
                    <th>Merchant</th>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Qty</th>
                </tr>
            </thead>
            <tbody id="market-list-container">
                </tbody>
        </table>
    </div>

    <div id="allies" class="content-section">
        <div id="allies-container" class="allies-container">
            </div>
    </div>
</div>

<div id="createModal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer; font-size:2rem;" onclick="closeModal()">&times;</span>
        <h2 style="text-align:center; font-family:'MedievalSharp';">Post New Wares</h2>
        
        <div id="modal-filter-container" class="filter-container">
            <button class="filter-btn active" onclick="filterList('wares', 'all', this)">All</button>
            </div>

        <div class="items-grid" id="wares-grid-container">
            </div>

        <form id="add-item-form" style="margin-top:20px;">
            <input type="hidden" id="selected_item_name" required>
            <p style="text-align:center;">Selected: <span id="selection_label" class="red-text">None</span></p>
            <div style="display:flex; gap:10px;">
                <input type="number" id="form-price" placeholder="Price" style="flex:1; padding:10px;" required>
                <input type="number" id="form-qty" value="1" min="1" style="width:60px; padding:10px;">
            </div>
            <button type="submit" class="tab-btn" style="width:100%; margin-top:15px; background:var(--border-ink); color:white;">POST LISTING</button>
        </form>
    </div>
</div>
<script>
const API_BASE_URL = "http://127.0.0.1:5000";

let currentUser = JSON.parse(localStorage.getItem('user_session')) || { is_logged_in: false };

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.has('logged')) {
    currentUser = {
        is_logged_in: true,
        username: urlParams.get('user'),
        avatar: urlParams.get('avatar'),
        id: urlParams.get('id')
    };
    localStorage.setItem('user_session', JSON.stringify(currentUser));
    window.location.href = "https://prizakita.github.io/"; 
}

async function init() {
    renderAuth(currentUser);
    
    const addBtn = document.getElementById('btn-open-modal');
    if (addBtn) {
        addBtn.style.display = currentUser.is_logged_in ? 'block' : 'none';
    }

    try {
        const res = await fetch(`${API_BASE_URL}/api/market-data`);
        const data = await res.json();
        
        renderValues(data.items);
        renderMarket(data.all_market_listings);
        renderAllies(data.allies);
    } catch (e) {
        console.error("Errore fetch:", e);
    }
}

function showSection(id, btn) {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    const target = document.getElementById(id);
    if (target) target.classList.add('active');
    if (btn) btn.classList.add('active');
}

function renderAuth(user) {
    const authBar = document.getElementById('auth-bar');
    if (!authBar) return;
    
    if (user && user.is_logged_in) {
        authBar.innerHTML = `
            <div class="user-profile-box">
                <img src="${user.avatar}" alt="Avatar" class="user-avatar-small">
                <span class="user-name-text">${user.username}</span>
                <button onclick="logout()" class="btn-logout-custom">Logout</button>
            </div>`;
    } else {
        authBar.innerHTML = `<a href="${API_BASE_URL}/login" class="btn-discord">LOGIN WITH DISCORD</a>`;
    }
}

function renderValues(items) {
    const listCont = document.getElementById('values-list-container');
    const filterCont = document.getElementById('values-filter-container');
    const modalFilterCont = document.getElementById('modal-filter-container');
    const modalGridCont = document.getElementById('wares-grid-container');
    if (!listCont) return;

    filterCont.innerHTML = '<button class="filter-btn active" onclick="filterList(\'values\', \'all\', this)">All</button>';
    modalFilterCont.innerHTML = '<button class="filter-btn active" onclick="filterList(\'wares\', \'all\', this)">All</button>';
    listCont.innerHTML = "";
    modalGridCont.innerHTML = "";

    Object.keys(items).forEach(cat => {
        filterCont.innerHTML += `<button class="filter-btn" onclick="filterList('values', '${cat}', this)">${cat}</button>`;
        modalFilterCont.innerHTML += `<button class="filter-btn" onclick="filterList('wares', '${cat}', this)">${cat}</button>`;
        Object.values(items[cat]).forEach(item => {
            listCont.innerHTML += `
                <div class="value-row" data-category="${cat}">
                    <div class="col-item"><img src="${item.image_url || ''}"><span>${item.name}</span></div>
                    <div class="gold-text">${item.value || 100}g</div>
                    <div><div class="demand-bar"><div class="demand-fill" style="width: ${item.demand || 50}%"></div></div></div>
                </div>`;
            modalGridCont.innerHTML += `
                <div class="item-card" data-category="${cat}" onclick="selectItem(this, '${item.name}')">
                    <img src="${item.image_url || ''}"><p>${item.name}</p>
                </div>`;
        });
    });
}

function renderMarket(listings) {
    const cont = document.getElementById('market-list-container');
    if (!cont) return;
    cont.innerHTML = listings.length ? "" : '<tr><td colspan="4">Market is empty...</td></tr>';
    listings.forEach(entry => {
        cont.innerHTML += `<tr><td>${entry.seller_name}</td><td>${entry.item}</td><td class="gold-text">${entry.prezzo}g</td><td>x${entry.quantity}</td></tr>`;
    });
}

function renderAllies(allies) {
    const cont = document.getElementById('allies-container');
    if (!cont) return;
    cont.innerHTML = "";
    allies.forEach(guild => {
        const tags = guild.featured_products.map(p => `<span class="p-tag">${p}</span>`).join('');
        cont.innerHTML += `
            <div class="guild-card">
                <div class="guild-banner" style="background-image: url('${guild.banner_img}')"></div>
                <div class="guild-body"><h3>${guild.name}</h3><p>${guild.description}</p><div>${tags}</div>
                <a href="${guild.discord_url}" class="btn-discord-join" target="_blank">JOIN</a></div>
            </div>`;
    });
}

function filterList(type, category, btn) {
    const parent = btn.parentElement;
    parent.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const selector = type === 'values' ? '.value-row' : '.item-card';
    document.querySelectorAll(selector).forEach(el => {
        el.style.display = (category === 'all' || el.dataset.category === category) ? (type === 'values' ? 'grid' : 'block') : 'none';
    });
}

function selectItem(el, name) {
    document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('selected_item_name').value = name;
    document.getElementById('selection_label').innerText = name;
}

function logout() { localStorage.removeItem('user_session'); window.location.reload(); }
function openModal() { 
    document.getElementById('createModal').style.display = 'block'; 
}

function closeModal() { 
    document.getElementById('createModal').style.display = 'none'; 
}

const addItemForm = document.getElementById('add-item-form');
if (addItemForm) {
    addItemForm.onsubmit = async (e) => {
        e.preventDefault();

        const savedUser = JSON.parse(localStorage.getItem('user_session'));
        if (!savedUser || !savedUser.is_logged_in) {
            alert("Devi essere loggato!");
            return;
        }

        const payload = {
            seller_id: savedUser.id,
            seller_name: savedUser.username,
            item: document.getElementById('selected_item_name').value,
            prezzo: document.getElementById('form-price').value,
            quantity: document.getElementById('form-qty').value
        };

        try {
            const res = await fetch(`${API_BASE_URL}/api/add_item`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                closeModal();
                location.reload();
            }
        } catch (err) {
            console.error("Errore invio:", err);
        }
    };
}

init();
</script>
</body>
</html>
