<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Stone Trade Hub</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scroll">
    <h1 class="main-title">⚖️ An Overworld Merchants' Guild Hub 🪙</h1>

    <div class="navbar-container">
        <div class="left-section">
            <div class="social-circles">
                <a href="https://discord.gg/GdVBuQgkvZ" rel="noopener" target="_blank" class="circle-btn discord-color">
                    <img src="discord.png" alt="Discord">
                </a>
                <a href="https://www.roblox.com/communities/825373402/The-Merchants-Guild#!/about" rel="noopener" target="_blank" class="circle-btn roblox-color">
                    <img src="roblox.png" alt="Roblox">
                </a>
            </div>
            <span class="version-text">Version: V1</span>
        </div>

        <div id="auth-bar" class="auth-bar"></div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showSection('values-section', this)">VALUES</button>
        <button class="tab-btn" onclick="showSection('market-section', this)">GUILD MARKET</button>
        <button class="tab-btn" onclick="showSection('comingsoon-section', this)">ALLIED GUILD MARKET</button>
        <button class="tab-btn" onclick="showSection('allies-section', this)">ALLIED GUILDS</button>
    </div>

    <div class="action-container">
        <button id="btn-open-modal" class="btn-main" onclick="openModal()">+ ADD LISTING</button>
    </div>

    <div id="values-section" class="content-section active">
        <div id="values-filters" class="filter-container">
            <button class="filter-btn active" onclick="filterList('values', 'all', this)">All</button>
        </div>

        <div class="table-header-grid">
            <span>ITEM</span>
            <span>CATEGORY</span>
            <span>VALUE</span>
            <span>DEMAND</span>
        </div>
        <div id="values-list"></div>
    </div>

    <div id="market-section" class="content-section">
        <table class="market-table">
            <thead>
                <tr>
                    <th>Merchant</th>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Qty</th>
                </tr>
            </thead>
            <tbody id="market-list"></tbody>
        </table>
    </div>

    <div id="allies-section" class="content-section">
        <div id="allies-list" class="allies-grid"></div>
    </div>

    <div id="comingsoon-section" class="content-section">
        <h1> Coming soon </h1>
    </div>
</div>

<div id="createModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 class="medieval-text">Create New Listing</h2>
        <form id="add-item-form">
            <div id="modal-filters" class="filter-row"></div>
            <div id="modal-grid" class="wares-grid"></div>

            <div class="form-container">
                <div id="selection_label" class="selection-status">Please select an item above</div>
                <input type="hidden" id="selected_item_name" required>
            
                <div class="form-row">
                    <div class="form-group">
                        <label>Asking Price (Gold)</label>
                        <input type="number" id="form-price" class="input-field" placeholder="0" required>
                    </div>

                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="form-qty" class="input-field" placeholder="0" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">POST LISTING</button>
            </div>
        </form>
    </div>
</div>

<script>
const API_BASE_URL = "http://overworld.servehttp.com:5000";

let currentUser = JSON.parse(localStorage.getItem('user_session')) || { is_logged_in: false };

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.has('logged')) {
    currentUser = {
        is_logged_in: true,
        username: urlParams.get('user'),
        avatar: urlParams.get('avatar'),
        id: urlParams.get('id'),
        role: urlParams.get('role')
    };
    
    console.log("Dati ricevuti dal server:", currentUser);
    localStorage.setItem('user_session', JSON.stringify(currentUser));

    window.history.replaceState({}, document.title, window.location.pathname);
}

async function init() {
    renderUserUI(currentUser);
    
    const addBtn = document.getElementById('btn-open-modal');
    if (addBtn) {
        addBtn.style.display = currentUser.is_logged_in ? 'inline-block' : 'none';
    }

    try {
        const res = await fetch(`${API_BASE_URL}/api/market-data`);
        const data = await res.json();

        renderValues(data.items);
        renderMarket(data.all_market_listings);
        renderAllies(data.allies);
    } catch (e) {
        console.error(e);
    }
}

function showSection(sectionId, btn) {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(sectionId).classList.add('active');
    btn.classList.add('active');
}

function renderUserUI(user) {
    const bar = document.getElementById('auth-bar');
    if (!bar) return;
    
    if (user && user.is_logged_in) {
        bar.innerHTML = `
            <div class="user-chip">
                <img src="${user.avatar}" class="user-avatar">
                <span class="user-name">${user.username}</span>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>`;
    } else {
        bar.innerHTML = `<a href="${API_BASE_URL}/login" class="btn-discord-login">LOGIN WITH DISCORD</a>`;
    }
}

function renderValues(items) {
    const list = document.getElementById('values-list');
    const filters = document.getElementById('values-filters');
    const mFilters = document.getElementById('modal-filters');
    const mGrid = document.getElementById('modal-grid');
    if (!list) return;

    filters.innerHTML = '<button class="filter-btn active" onclick="filterList(\'values\', \'all\', this)">All</button>';
    mFilters.innerHTML = '<button class="filter-btn active" onclick="filterList(\'wares\', \'all\', this)">All</button>';
    list.innerHTML = "";
    mGrid.innerHTML = "";

    Object.keys(items).forEach(cat => {
        filters.innerHTML += `<button class="filter-btn" onclick="filterList('values', '${cat}', this)">${cat}</button>`;
        mFilters.innerHTML += `<button class="filter-btn" onclick="filterList('wares', '${cat}', this)">${cat}</button>`;

        Object.values(items[cat]).forEach(item => {
            list.innerHTML += `
                <div class="value-row" data-category="${cat}">
                    <div class="item-info">
                        <img src="${item.image_url || ''}" alt="${item.name}">
                        <span>${item.name}</span>
                    </div>
                    <div class="item-cat">${cat}</div>
                    <div class="gold-price">${item.value || 0}g</div>
                    <div class="demand-box">
                        <div class="demand-bar">
                            <div class="bar-fill" style="width: ${item.demand || 50}%"></div>
                        </div>
                    </div>
                </div>`;

            mGrid.innerHTML += `
                <div class="ware-card" data-category="${cat}" onclick="selectItem(this, '${item.name}', '${cat}', ${item.value || 0})">
                    <img src="${item.image_url || ''}" alt="${item.name}">
                    <p>${item.name}</p>
                </div>`;
        });
    });
}

function renderMarket(listings) {
    const container = document.getElementById('market-list');
    if (!container) return;
    container.innerHTML = listings.length ? "" : '<tr><td colspan="4">Market is empty...</td></tr>';
    listings.forEach(entry => {
        container.innerHTML += `<tr><td>${entry.seller_name}</td><td>${entry.item}</td><td class="gold-price">${entry.prezzo}g</td><td>x${entry.quantity}</td></tr>`;
    });
}

function renderAllies(allies) {
    const container = document.getElementById('allies-list');
    if (!container) return;
    container.innerHTML = "";

    allies.forEach(guild => {
        const tagsHTML = guild.featured_products.map(p => `<span class="p-tag">${p}</span>`).join('');

        container.innerHTML += `
            <div class="guild-card">
                <div class="guild-banner" style="background-image: url('${guild.banner_img}')"></div>
                <div class="guild-body">
                    <h3>${guild.name}</h3>
                    <p class="guild-desc">${guild.description}</p>
                    <div class="tags-container">${tagsHTML}</div>
                    <a href="${guild.discord_url}" class="btn-discord-join" target="_blank">JOIN DISCORD</a>
                </div>
            </div>`;
    });
}

function filterList(type, category, btn) {
    btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const selector = type === 'values' ? '.value-row' : '.ware-card';
    document.querySelectorAll(selector).forEach(el => {
        el.style.display = (category === 'all' || el.dataset.category === category) ? (type === 'values' ? 'grid' : 'block') : 'none';
    });
}

function selectItem(el, name, cat, defaultValue) {
    document.querySelectorAll('.ware-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');

    document.getElementById('selected_item_name').value = name;
    document.getElementById('selection_label').innerText = "Selected Item: " + name;

    const priceInput = document.getElementById('form-price');
    if(priceInput) priceInput.value = defaultValue;
}

function showAlert(message) {
    const alert = document.createElement('div');
    alert.className = 'alert-error';
    alert.textContent = message;
    document.body.appendChild(alert);
    setTimeout(() => alert.remove(), 3000);
}

function logout() { localStorage.removeItem('user_session'); window.location.reload(); }
function openModal() { document.getElementById('createModal').style.display = 'block'; }
function closeModal() { document.getElementById('createModal').style.display = 'none'; }

const form = document.getElementById('add-item-form');
if (form) {
    form.onsubmit = async (e) => {
        e.preventDefault();
        const user = JSON.parse(localStorage.getItem('user_session'));
        if (!user) return;

        const payload = {
            seller_id: user.id,
            seller_name: user.username,
            user_role: user.role,
            item: document.getElementById('selected_item_name').value,
            prezzo: document.getElementById('form-price').value,
            quantity: document.getElementById('form-qty').value
        };

        try {
            const res = await fetch(`${API_BASE_URL}/api/add_item`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) location.reload();
        } catch (err) { console.error(err); }
    };
}

init();
</script>
</body>
</html>
